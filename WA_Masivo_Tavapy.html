<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WA Masivo PLRA Tavapy</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#0a0f1e;color:#e2e8f0;min-height:100vh}
/* HEADER */
.hdr{background:#0d1b3e;border-bottom:2px solid #1e88e5;padding:12px 20px;position:sticky;top:0;z-index:200;box-shadow:0 4px 20px rgba(0,0,0,.6)}
.hdr h1{font-size:1.05rem;font-weight:800;color:#fff;margin-bottom:6px}
.hdr h1 span{color:#00e676}
.hs{display:flex;gap:8px;flex-wrap:wrap}
.chip{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:3px 11px;font-size:.72rem;color:#94a3b8}
.chip b{color:#e2e8f0}
.hbts{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.hbt{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:8px;color:#cbd5e1;font-size:.75rem;padding:5px 12px;cursor:pointer;transition:all .2s}
.hbt:hover{background:rgba(255,255,255,.14);color:#fff}
.hbt.green{background:rgba(0,200,83,.2);border-color:rgba(0,200,83,.4);color:#00e676}
.hbt.blue{background:rgba(30,136,229,.2);border-color:rgba(30,136,229,.4);color:#90caf9}
/* MSG PANEL */
.mp{background:#111827;border-bottom:1px solid rgba(255,255,255,.07);padding:12px 20px}
.mp label{font-size:.68rem;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:1px;display:block;margin-bottom:5px}
#msgT{width:100%;background:#0d1525;border:1px solid rgba(255,255,255,.1);border-radius:10px;color:#e2e8f0;font-family:Arial,sans-serif;font-size:.8rem;padding:10px 14px;height:180px;resize:vertical;line-height:1.6}
#msgT:focus{outline:none;border-color:#1e88e5}
.vrs{font-size:.68rem;color:#64748b;margin-top:4px}
.vrs code{background:rgba(255,255,255,.08);border-radius:4px;padding:1px 5px;color:#00e676}
/* TABS */
.tabs{display:flex;gap:4px;padding:10px 20px 0;overflow-x:auto;background:#0a0f1e;position:sticky;top:120px;z-index:90;border-bottom:1px solid rgba(255,255,255,.07)}
.tabs::-webkit-scrollbar{height:4px}
.tabs::-webkit-scrollbar-thumb{background:#1e88e5;border-radius:2px}
.tab{background:transparent;border:1px solid rgba(255,255,255,.1);border-bottom:3px solid transparent;border-radius:8px 8px 0 0;color:#64748b;font-size:.76rem;font-weight:700;padding:7px 13px;cursor:pointer;white-space:nowrap;transition:all .2s;min-width:90px}
.tab:hover{color:#e2e8f0}
.tab.active{color:#fff;background:#111827;border-color:#1e88e5;border-bottom-color:#111827}
.tab .pct{display:block;font-size:.58rem;font-weight:400;color:#00c853;margin-top:1px;text-align:center}
/* TOOLBAR */
.tbr{padding:10px 20px;display:flex;gap:7px;flex-wrap:wrap;align-items:center;background:#0a0f1e}
.src{flex:1;min-width:150px;background:#111827;border:1px solid rgba(255,255,255,.1);border-radius:8px;color:#e2e8f0;font-size:.83rem;padding:7px 12px}
.src:focus{outline:none;border-color:#1e88e5}
.src::placeholder{color:#475569}
.fb{background:#111827;border:1px solid rgba(255,255,255,.1);border-radius:8px;color:#64748b;font-size:.75rem;padding:7px 11px;cursor:pointer;white-space:nowrap;transition:all .2s}
.fb.on{color:#00e676;border-color:#00c853}
/* MBAR */
.mbar{padding:7px 20px;display:flex;gap:12px;flex-wrap:wrap;font-size:.74rem;color:#64748b;background:#111827;border-bottom:1px solid rgba(255,255,255,.07);align-items:center}
.mbar b{color:#e2e8f0}
.pbg{flex:1;min-width:90px;height:5px;background:rgba(255,255,255,.08);border-radius:3px;overflow:hidden}
.pf{height:100%;background:linear-gradient(90deg,#00c853,#00e676);border-radius:3px;transition:width .4s}
/* REPORTE */
.rpt{display:none;padding:14px 20px;background:#0d1525;border-bottom:2px solid #1e88e5}
.rpt.show{display:block}
.rpt h2{font-size:.85rem;font-weight:800;color:#90caf9;margin-bottom:10px;text-transform:uppercase;letter-spacing:.5px}
.rtbl{width:100%;border-collapse:collapse;font-size:.75rem}
.rtbl th{background:#0a1628;color:#64748b;padding:7px 10px;text-align:left;font-weight:700;text-transform:uppercase;font-size:.65rem;letter-spacing:.5px}
.rtbl td{padding:7px 10px;border-bottom:1px solid rgba(255,255,255,.05);color:#e2e8f0}
.rtbl tr:last-child td{border-bottom:none}
.rtbl .tot{background:rgba(30,136,229,.1);font-weight:700}
.rp{color:#00e676;font-weight:700}
.rd{color:#ffd600;font-weight:700}
.rn{color:#f87171;font-weight:700}
.rv{color:#00b0ff;font-weight:700}
/* GRID */
.grid{padding:12px 20px 50px;display:grid;grid-template-columns:repeat(auto-fill,minmax(285px,1fr));gap:9px}
/* CARD */
.card{background:#111827;border:1px solid rgba(255,255,255,.07);border-radius:12px;padding:12px;display:flex;flex-direction:column;gap:8px;transition:border-color .2s;position:relative}
.card:hover{border-color:rgba(30,136,229,.3)}
.card.csent{border-color:rgba(0,200,83,.25);background:linear-gradient(135deg,#111827 75%,rgba(0,200,83,.04))}
.card.cvis{border-color:rgba(0,176,255,.25);background:linear-gradient(135deg,#111827 75%,rgba(0,176,255,.04))}
.card.nonum{opacity:.72}
.ctop{display:flex;justify-content:space-between;align-items:flex-start;gap:7px}
.cname{font-size:.85rem;font-weight:700;color:#fff;line-height:1.3}
.cbdg{display:flex;gap:3px;flex-wrap:wrap;justify-content:flex-end;flex-shrink:0}
.bdg{font-size:.6rem;font-weight:700;border-radius:5px;padding:2px 6px}
.bm{background:rgba(21,101,192,.3);color:#1e88e5;border:1px solid rgba(21,101,192,.4)}
.bo{background:rgba(255,214,0,.15);color:#ffd600;border:1px solid rgba(255,214,0,.3)}
.bs{background:rgba(0,200,83,.2);color:#00e676;border:1px solid rgba(0,200,83,.35)}
.bv{background:rgba(0,176,255,.2);color:#00b0ff;border:1px solid rgba(0,176,255,.35)}
.cced{font-size:.68rem;color:#475569}
.ccol{font-size:.7rem;color:#64748b}
/* ESTADO ROW */
.crow{display:flex;align-items:center;gap:7px}
.elbl{font-size:.68rem;color:#64748b;white-space:nowrap}
.esel{flex:1;background:#0d1525;border:1px solid rgba(255,255,255,.12);border-radius:7px;color:#e2e8f0;font-size:.75rem;padding:5px 8px;cursor:pointer}
.esel:focus{outline:none;border-color:#1e88e5}
.esel.ep{border-color:rgba(0,200,83,.5);color:#00e676;background:rgba(0,200,83,.08)}
.esel.ed{border-color:rgba(255,214,0,.5);color:#ffd600;background:rgba(255,214,0,.08)}
.esel.en{border-color:rgba(248,113,113,.5);color:#f87171;background:rgba(248,113,113,.08)}
/* PHONE ROW */
.cbot{display:flex;align-items:center;gap:7px}
.teli{flex:1;background:#0d1525;border:1px solid rgba(255,255,255,.1);border-radius:7px;color:#94a3b8;font-size:.78rem;padding:6px 9px;font-family:monospace}
.teli:focus{outline:none;border-color:#1e88e5;color:#e2e8f0}
.teli.hn{border-color:rgba(0,200,83,.3)}
/* ACTION BUTTONS */
.acts{display:flex;gap:5px}
.benv{background:linear-gradient(135deg,#00c853,#00a844);border:none;border-radius:7px;color:#fff;font-weight:700;font-size:.72rem;padding:7px 11px;cursor:pointer;transition:opacity .15s,transform .1s;white-space:nowrap}
.benv:hover{opacity:.85;transform:scale(1.03)}
.benv.st{background:linear-gradient(135deg,#1b5e20,#2e7d32);font-size:.68rem}
.bvis{background:rgba(0,176,255,.15);border:1px solid rgba(0,176,255,.3);border-radius:7px;color:#00b0ff;font-size:.72rem;padding:7px 9px;cursor:pointer;transition:all .15s;white-space:nowrap}
.bvis:hover{background:rgba(0,176,255,.25)}
.bvis.on{background:rgba(0,176,255,.25);border-color:rgba(0,176,255,.6);font-weight:700}
/* TOAST */
.toast{position:fixed;bottom:18px;right:18px;background:#00c853;color:#fff;font-weight:700;font-size:.8rem;padding:9px 16px;border-radius:9px;z-index:9999;transform:translateY(60px);opacity:0;transition:all .3s cubic-bezier(.34,1.56,.64,1);box-shadow:0 8px 24px rgba(0,0,0,.5)}
.toast.show{transform:translateY(0);opacity:1}
/* EMPTY */
.emp{text-align:center;padding:40px 20px;color:#475569;grid-column:1/-1;font-size:.9rem}
@media(max-width:600px){
  .hdr,.mp,.tbr,.grid,.mbar,.rpt{padding-left:12px;padding-right:12px}
  .tabs{padding-left:12px}
  .grid{grid-template-columns:1fr}
  .tabs{top:108px}
}
</style>
</head>

  document.getElementById("mbT").textContent=s.total;
  document.getElementById("mbC").textContent=s.co;
  document.getElementById("mbE").textContent=s.se;
  document.getElementById("mbV").textContent=s.vi;
  document.getElementById("mbPo").textContent=s.po;
  document.getElementById("mbDu").textContent=s.du;
  document.getElementById("mbNo").textContent=s.no;
  document.getElementById("mbP").textContent=p+"%";
  document.getElementById("pf").style.width=p+"%";
}

function bTabs(){
  var c=document.getElementById("tabs");c.innerHTML="";
  ms.forEach(function(m){
    var s=gS(pm[m]),p=s.co>0?Math.round(s.se/s.co*100):0;
    var b=document.createElement("button");
    b.className="tab"+(m===mA?" active":"");
    b.id="t"+m;
    var sp=document.createElement("span");sp.className="pct";
    sp.innerHTML=p>0?"&#10003; "+p+"%":"";
    b.textContent="Mesa "+m+" ("+pm[m].length+")";
    b.appendChild(sp);
    b.onclick=(function(mm){return function(){mA=mm;flt="";bq="";document.getElementById("srch").value="";clrF();rnd();};})(m);
    c.appendChild(b);
  });
}

function lF(){
  var l=pm[mA]||[];
  if(bq){var q=bq.toLowerCase();l=l.filter(function(e){return(e.a+" "+e.n).toLowerCase().indexOf(q)>=0||e.c.indexOf(q)>=0;});}
  if(flt==="sin")  l=l.filter(function(e){return!gt(e);});
  else if(flt==="sent") l=l.filter(function(e){return!!env[e.c];});
  else if(flt==="vis")  l=l.filter(function(e){return!!vis[e.c];});
  else if(flt==="pos")  l=l.filter(function(e){return est[e.c]==="P";});
  else if(flt==="dud")  l=l.filter(function(e){return est[e.c]==="D";});
  else if(flt==="nop")  l=l.filter(function(e){return est[e.c]==="N";});
  return l;
}

function mkCard(e){
  var tel=gt(e),isSent=!!env[e.c],isVis=!!vis[e.c],estado=est[e.c]||"";
  var d=document.createElement("div");
  d.className="card"+(isSent?" csent":"")+(isVis&&!isSent?" cvis":"")+(!tel?" nonum":"");
  d.id="cd"+e.c;

  /* TOP */
  var top=document.createElement("div");top.className="ctop";
  var nm=document.createElement("div");nm.className="cname";nm.textContent=(e.a+" "+e.n).trim();
  var bdg=document.createElement("div");bdg.className="cbdg";
  var b1=document.createElement("span");b1.className="bdg bm";b1.textContent="Mesa "+e.m;
  var b2=document.createElement("span");b2.className="bdg bo";b2.textContent="Ord. "+e.o;
  bdg.appendChild(b1);bdg.appendChild(b2);
  if(isSent){var bs=document.createElement("span");bs.className="bdg bs";bs.innerHTML="&#9989;";bdg.appendChild(bs);}
  if(isVis) {var bv=document.createElement("span");bv.className="bdg bv";bv.innerHTML="&#128065;";bdg.appendChild(bv);}
  top.appendChild(nm);top.appendChild(bdg);

  /* CI */
  var ci=document.createElement("div");ci.className="cced";ci.innerHTML="&#128196; C.I. "+e.c;

  /* COLEGIO */
  var cl=document.createElement("div");cl.className="ccol";cl.innerHTML="&#128205; "+(e.col||"TAVAPY");

  /* ESTADO ROW */
  var er=document.createElement("div");er.className="crow";
  var el=document.createElement("span");el.className="elbl";el.textContent="Estado:";
  var sel=document.createElement("select");sel.className="esel";
  sel.id="es"+e.c;sel.dataset.c=e.c;
  var opts=[["","-- Sin estado --"],["P","✅ Positivo"],["D","⚠️ Dudoso"],["N","❌ NO"]];
  opts.forEach(function(o){var op=document.createElement("option");op.value=o[0];op.textContent=o[1];if(estado===o[0])op.selected=true;sel.appendChild(op);});
  if(estado==="P")sel.className="esel ep";
  else if(estado==="D")sel.className="esel ed";
  else if(estado==="N")sel.className="esel en";
  sel.addEventListener("change",function(){saveEst(this.dataset.c,this.value,this);});
  er.appendChild(el);er.appendChild(sel);

  /* PHONE + ACTIONS */
  var bot=document.createElement("div");bot.className="cbot";
  var inp=document.createElement("input");inp.type="tel";
  inp.className="teli"+(tel?" hn":"");
  inp.id="ti"+e.c;inp.dataset.c=e.c;
  inp.placeholder=tel?"Num. registrado":"Sin n\u00famero";
  inp.value=tel?maskTel(tel):"";
  inp.setAttribute("data-real",tel);
  inp.setAttribute("autocomplete","off");
  inp.addEventListener("focus",function(){
    var r=this.getAttribute("data-real");
    this.value=r||"";
    this.type="tel";
  });
  inp.addEventListener("blur",function(){
    var v=this.value.trim();
    if(v&&v!==this.getAttribute("data-real")){
      saveN(this.dataset.c,v);
    }
    var real=this.getAttribute("data-real")||ncustom[this.dataset.c]||"";
    this.value=real?maskTel(real):"";
    this.placeholder=real?"Num. registrado":"Sin n\u00famero";
    this.className="teli"+(real?" hn":"");
  });
  if(isSent)inp.disabled=true;

  var acts=document.createElement("div");acts.className="acts";

  var btnVis=document.createElement("button");
  btnVis.className="bvis"+(isVis?" on":"");
  btnVis.id="bv"+e.c;btnVis.dataset.c=e.c;
  btnVis.innerHTML=isVis?"&#9989; Visitado":"&#128065; Visitar";
  btnVis.addEventListener("click",function(){toggleVis(this.dataset.c);});

  var btnEnv=document.createElement("button");
  btnEnv.className="benv"+(isSent?" st":"");
  btnEnv.id="be"+e.c;btnEnv.dataset.c=e.c;
  btnEnv.innerHTML=isSent?"&#9989; Enviado":"&#128172; Enviar";
  btnEnv.addEventListener("click",function(){enviar(this.dataset.c);});

  acts.appendChild(btnVis);acts.appendChild(btnEnv);
  bot.appendChild(inp);bot.appendChild(acts);

  d.appendChild(top);d.appendChild(ci);d.appendChild(cl);d.appendChild(er);d.appendChild(bot);
  return d;
}

function rGrid(){
  var g=document.getElementById("grid"),l=lF();
  g.innerHTML="";
  if(!l.length){
    var em=document.createElement("div");em.className="emp";
    em.innerHTML="&#128269; No hay resultados.";
    g.appendChild(em);return;
  }
  var frag=document.createDocumentFragment();
  l.forEach(function(e){frag.appendChild(mkCard(e));});
  g.appendChild(frag);
}

function saveN(c,val){
  val=(val||"").replace(/[^0-9+]/g,"");
  if(val.charAt(0)==="0")val=val.slice(1);
  if(val)ncustom[c]=val;else delete ncustom[c];
  localStorage.setItem(LN,JSON.stringify(ncustom));
  var inp=document.getElementById("ti"+c);
  if(inp){inp.setAttribute("data-real",val||"");inp.className="teli"+(val?" hn":"");}
}

function saveEst(c,val,sel){
  if(val)est[c]=val;else delete est[c];
  localStorage.setItem(LS,JSON.stringify(est));
  if(sel){
    sel.className="esel";
    if(val==="P")sel.className="esel ep";
    else if(val==="D")sel.className="esel ed";
    else if(val==="N")sel.className="esel en";
  }
  upGlob();upBar();upTab(mA);
}

function toggleVis(c){
  if(vis[c])delete vis[c];else vis[c]=Date.now();
  localStorage.setItem(LV,JSON.stringify(vis));
  var card=document.getElementById("cd"+c);
  var btn=document.getElementById("bv"+c);
  if(vis[c]){
    if(card&&!card.classList.contains("csent"))card.classList.add("cvis");
    if(btn){btn.innerHTML="&#9989; Visitado";btn.classList.add("on");}
    var bdg=card?card.querySelector(".cbdg"):null;
    if(bdg&&!bdg.querySelector(".bv")){var bv=document.createElement("span");bv.className="bdg bv";bv.innerHTML="&#128065;";bdg.appendChild(bv);}
  } else {
    if(card)card.classList.remove("cvis");
    if(btn){btn.innerHTML="&#128065; Visitar";btn.classList.remove("on");}
    var bdg2=card?card.querySelector(".bv"):null;if(bdg2)bdg2.remove();
  }
  upGlob();upBar();upTab(mA);
  toast(vis[c]?"&#128065; Marcado como Visitado":"Visita removida","#00b0ff");
}

function enviar(c){
  var e=D.find(function(x){return x.c===c;});
  if(!e)return;
  var tel=gt(e);
  if(!tel){
    toast("Ingres\u00e1 el n\u00famero primero","#e53935");
    var inp=document.getElementById("ti"+c);
    if(inp){inp.blur();setTimeout(function(){inp.focus();},50);}
    return;
  }
  var num=tel.replace(/[^0-9]/g,"");
  if(num.charAt(0)==="0")num=num.slice(1);
  if(num.slice(0,3)!=="595")num="595"+num;
  window.open("https://wa.me/"+num+"?text="+encodeURIComponent(bMsg(e)),"_blank");
  env[c]=Date.now();localStorage.setItem(LK,JSON.stringify(env));
  var card=document.getElementById("cd"+c);
  if(card){
    card.classList.add("csent");card.classList.remove("nonum","cvis");
    var btn=document.getElementById("be"+c);
    if(btn){btn.innerHTML="&#9989; Enviado";btn.className="benv st";}
    var bd=card.querySelector(".cbdg");
    if(bd&&!bd.querySelector(".bs")){var sp=document.createElement("span");sp.className="bdg bs";sp.innerHTML="&#9989;";bd.appendChild(sp);}
    var inp=document.getElementById("ti"+c);if(inp)inp.disabled=true;
  }
  upGlob();upBar();upTab(e.m);
  toast("&#128228; Enviado a "+(e.a+" "+e.n).trim());
}

function upTab(m){
  var s=gS(pm[m]||[]),p=s.co>0?Math.round(s.se/s.co*100):0;
  var t=document.getElementById("t"+m);
  if(t){var sp=t.querySelector(".pct");if(sp)sp.innerHTML=(p>0?"&#10003; "+p+"%":"");}
}

/* REPORTE */
function toggleRpt(){
  var p=document.getElementById("rptPanel");
  if(p.classList.contains("show")){p.classList.remove("show");return;}
  buildRpt();p.classList.add("show");
}
function buildRpt(){
  var rows=[];
  ms.forEach(function(m){rows.push({m:"Mesa "+m,s:gS(pm[m]||[])});});
  rows.push({m:"TOTAL GLOBAL",s:gS(D),tot:true});
  var tbl=document.createElement("table");tbl.className="rtbl";
  var hdr=document.createElement("tr");
  ["Mesa","Total","Con N\u00ba","Enviados","Visitados","Positivo","Dudoso","NO","Sin Estado"].forEach(function(h){
    var th=document.createElement("th");th.textContent=h;hdr.appendChild(th);
  });
  tbl.appendChild(hdr);
  rows.forEach(function(r){
    var s=r.s;
    var sinE=s.total-s.po-s.du-s.no;
    var tr=document.createElement("tr");
    if(r.tot)tr.className="tot";
    var vals=[r.m,s.total,s.co,s.se,s.vi,s.po,s.du,s.no,sinE];
    var cls=["","","","","","rp","rd","rn",""];
    vals.forEach(function(v,i){
      var td=document.createElement("td");
      td.textContent=v;
      if(cls[i])td.className=cls[i];
      tr.appendChild(td);
    });
    tbl.appendChild(tr);
  });
  var c=document.getElementById("rptContent");c.innerHTML="";c.appendChild(tbl);
}

/* BACKUP */
function exportBkp(){
  var bkp={v:1,fecha:new Date().toISOString(),enviados:env,numeros:ncustom,visitados:vis,estados:est};
  var blob=new Blob([JSON.stringify(bkp,null,2)],{type:"application/json"});
  var a=document.createElement("a");a.href=URL.createObjectURL(blob);
  a.download="backup_tavapy_"+new Date().toISOString().slice(0,10)+".json";
  a.click();
  toast("&#128190; Backup guardado exitosamente");
}
function importBkp(ev){
  var file=ev.target.files[0];if(!file)return;
  var rd=new FileReader();
  rd.onload=function(e){
    try{
      var bkp=JSON.parse(e.target.result);
      if(bkp.enviados)  {env=bkp.enviados; localStorage.setItem(LK,JSON.stringify(env));}
      if(bkp.numeros)   {ncustom=bkp.numeros;localStorage.setItem(LN,JSON.stringify(ncustom));}
      if(bkp.visitados) {vis=bkp.visitados; localStorage.setItem(LV,JSON.stringify(vis));}
      if(bkp.estados)   {est=bkp.estados;   localStorage.setItem(LS,JSON.stringify(est));}
      rnd();
      toast("&#128228; Backup cargado: "+(bkp.fecha||"").slice(0,10));
    }catch(err){toast("Error al leer backup","#e53935");}
  };
  rd.readAsText(file);
  ev.target.value="";
}

/* FILTROS */
function setF(f){
  flt=(flt===f?"":f);clrF();
  var map={sin:"fSin",sent:"fSent",vis:"fVis",pos:"fPos",dud:"fDud",nop:"fNop"};
  if(flt&&map[flt])document.getElementById(map[flt]).classList.add("on");
  rGrid();
}
function clrF(){["fSin","fSent","fVis","fPos","fDud","fNop"].forEach(function(x){document.getElementById(x).classList.remove("on");});}

/* TOAST */
var tT=null;
function toast(msg,bg){
  var t=document.getElementById("toast");t.innerHTML=msg;t.style.background=bg||"#00c853";
  t.classList.add("show");if(tT)clearTimeout(tT);
  tT=setTimeout(function(){t.classList.remove("show");},2800);
}

document.getElementById("srch").addEventListener("input",function(){bq=this.value.trim();rGrid();});

function rnd(){bTabs();upBar();upGlob();rGrid();var a=document.getElementById("t"+mA);if(a)a.scrollIntoView({inline:"center",block:"nearest"});}
rnd();

</script>
</body>
</html>
